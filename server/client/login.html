<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fynex Login</title>

    <link rel="stylesheet"
          href="auth.css">

</head>

<body>

<div class="auth-container">

    <!-- Animated Border -->

    <div class="auth-card">

        <div class="logo">

            F

        </div>

        <h1>Fynex</h1>

        <p>
            Welcome Back
        </p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

        <p>

            Don't have an account?

            <a href="register.html">

                Register

            </a>

        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
